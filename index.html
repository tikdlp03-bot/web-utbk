<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi UTBK 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <header>
            <h1>Simulasi UTBK - Tes Potensi Skolastik</h1>
            <div id="timer">Waktu: <span id="time">02:00</span></div>
        </header>

        <hr>

        <div id="quiz-box">
            <div class="question-number">Soal No. <span id="q-num">1</span></div>
            <p id="question-text">Loading soal...</p>

            <div class="options-container">
                <button class="option-btn" onclick="checkAnswer(0)">A. <span id="optA"></span></button>
                <button class="option-btn" onclick="checkAnswer(1)">B. <span id="optB"></span></button>
                <button class="option-btn" onclick="checkAnswer(2)">C. <span id="optC"></span></button>
                <button class="option-btn" onclick="checkAnswer(3)">D. <span id="optD"></span></button>
            </div>
        </div>

        <div id="result-box" class="hidden">
            <h2>Ujian Selesai!</h2>
            <p>Skor IRT / Nilai Anda:</p>
            <h1 id="score-text">0</h1>
            <button onclick="location.reload()" class="action-btn">Ulangi Ujian</button>
        </div>

        <footer id="quiz-footer">
            <button id="next-btn" class="action-btn" onclick="nextQuestion()">Next Soal</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
