<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Peserta UTBK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h2 style="color: #1e3a8a; margin-bottom: 20px;">LOGIN PESERTA UTBK</h2>
    <input type="text" id="login-user" placeholder="Masukkan Username">
    <input type="password" id="login-pass" placeholder="Masukkan Password">
    <button class="btn btn-primary" onclick="prosesLogin()">Masuk Ujian</button>
    <p id="error-text" class="error-msg">Username atau Password salah!</p>
</div>

<script>
    function prosesLogin() {
        const userIn = document.getElementById("login-user").value.trim();
        const passIn = document.getElementById("login-pass").value.trim();
        const errorText = document.getElementById("error-text");

        // Ambil data dari localStorage
        let dataPeserta = JSON.parse(localStorage.getItem("dataPeserta")) || [];

        // Cari akun yang cocok
        let akunCocok = dataPeserta.find(p => p.user.toLowerCase() === userIn.toLowerCase() && p.pass === passIn);

        if (akunCocok) {
            errorText.style.display = "none";
            // Simpan sesi user aktif
            localStorage.setItem("pesertaAktif", JSON.stringify(akunCocok));
            window.location.href = "index.html"; // Alihkan ke halaman ujian
        } else {
            errorText.style.display = "block";
        }
    }
</script>
</body>
</html>
