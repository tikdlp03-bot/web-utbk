<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - SIM UTBK</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>PANEL KONTROL ADMIN - SIM UTBK</h1>
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">Ke Halaman Login</button>
    </header>

    <div class="stats-grid">
        <div class="card bg-blue"><h3>Total Peserta</h3><h2 id="stat-total">0</h2></div>
        <div class="card bg-green"><h3>Rata-rata Skor</h3><h2 id="stat-avg">0</h2></div>
        <div class="card bg-yellow"><h3>Status Sistem</h3><h2>Lokal (OK)</h2></div>
    </div>

    <div class="main-layout">
        <div class="quiz-section">
            <h2>Kelola Akun Peserta</h2>
            <div class="form-box">
                <input type="text" id="input-nama" placeholder="Nama Lengkap">
                <input type="text" id="input-username" placeholder="Username">
                <input type="password" id="input-password" placeholder="Password">
                <button class="btn btn-primary" onclick="tambahPesertaLocal()">Tambah</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr><th>No</th><th>Nama Peserta</th><th>Username</th><th>Password</th><th>Skor</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabel-peserta-body"></tbody>
            </table>
        </div>

        <div class="sidebar">
            <h3>Analisis Nilai (BI)</h3>
            <div style="height: 250px; position: relative;"><canvas id="biChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    // Ambil database dari localStorage, jika belum ada buat data default termasuk akun 'eko'
    let dataPeserta = JSON.parse(localStorage.getItem("dataPeserta")) || [
        { nama: "Budi Santoso", user: "budi123", pass: "rahasia", skor: 750 },
        { nama: "Eko Prasetyo", user: "eko", pass: "123", skor: 0 }
    ];

    function renderTabel() {
        const tbody = document.getElementById("tabel-peserta-body");
        tbody.innerHTML = "";
        let totalSkor = 0;

        dataPeserta.forEach((p, indeks) => {
            totalSkor += p.skor;
            tbody.innerHTML += `
                <tr>
                    <td>${indeks + 1}</td>
                    <td><b>${p.nama}</b></td>
                    <td><code>${p.user}</code></td>
                    <td>••••••</td>
                    <td><span class="badge-skor">${p.skor}</span></td>
                    <td><button class="btn-del" onclick="hapusPeserta(${indeks})">Hapus</button></td>
                </tr>`;
        });

        document.getElementById("stat-total").innerText = dataPeserta.length;
        document.getElementById("stat-avg").innerText = dataPeserta.length > 0 ? Math.round(totalSkor / dataPeserta.length) : 0;
        
        localStorage.setItem("dataPeserta", JSON.stringify(dataPeserta));
        updateGrafik();
    }

    function tambahPesertaLocal() {
        const nama = document.getElementById("input-nama").value.trim();
        const user = document.getElementById("input-username").value.trim();
        const pass = document.getElementById("input-password").value.trim();

        if (nama && user && pass) {
            dataPeserta.push({ nama, user, pass, skor: 0 });
            renderTabel();
            document.getElementById("input-nama").value = "";
            document.getElementById("input-username").value = "";
            document.getElementById("input-password").value = "";
        } else { alert("Semua kolom harus diisi!"); }
    }

    function hapusPeserta(indeks) {
        if (confirm("Hapus peserta ini?")) { dataPeserta.splice(indeks, 1); renderTabel(); }
    }

    let grafikSaya;
    function updateGrafik() {
        const ctx = document.getElementById('biChart').getContext('2d');
        if (grafikSaya) grafikSaya.destroy();
        grafikSaya = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dataPeserta.map(p => p.nama),
                datasets: [{ label: 'Skor UTBK', data: dataPeserta.map(p => p.skor), backgroundColor: '#1e3a8a' }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 1000 } } }
        });
    }

    window.onload = renderTabel;
</script>
</body>
</html>
